<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione Istituto</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/app_noauth.js" defer></script>
</head>
<body>

<header>
    <h1>Registrazione Istituto</h1>
</header>

<main>
    <form id="registerForm" onsubmit="registerInstitute(); return false;">
        <input id="schoolName" type="text" placeholder="Nome Istituto" required>
        <input id="email" type="email" placeholder="Email istituzionale" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit">Registra</button>
    </form>

    <p id="result"></p>
</main>

</body>
</html>
