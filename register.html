<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Registrazione Istituto</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h2>Registrazione Istituto</h2>

    <input id="schoolName" type="text" placeholder="Nome Istituto" required>
    <input id="email" type="email" placeholder="Email istituzionale" required>
    <input id="password" type="password" placeholder="Password" required>

    <button onclick="registerSchool()">Registra</button>

    <p id="result"></p>
  </div>

  <script>
    async function registerSchool() {
      const schoolName = document.getElementById("schoolName").value;
      const adminEmail = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const result = document.getElementById("result");

      result.textContent = "Invio in corso...";

      try {
        const response = await fetch(
          "https://sinergiascuola-backend-192075040354.europe-west1.run.app/api",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "REGISTER_SCHOOL",
              params: {
                schoolName,
                adminEmail,
                password
              }
            })
          }
        );

        const data = await response.json();
        console.log("Risposta backend:", data);

        if (data.success) {
          result.style.color = "green";
          result.textContent = "Registrazione completata! Foglio creato: " + data.sheetId;
        } else {
          result.style.color = "red";
          result.textContent = "Errore: " + data.error;
        }

      } catch (err) {
        console.error(err);
        result.style.color = "red";
        result.textContent = "Errore di connessione al server.";
      }
    }
  </script>

</body>
</html>
